<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>actividad-3-2</title>
  </head>
  <body>
    <script>
      /*johan sneider berrio ramos, 
        ficha: 3312694 
        nivel: nivel-8 actividad-3-2
      */
      // ─── Funciones del carrito (puras — no mutan el original) ──────────────────

      const agregarProducto = (carrito, producto) => [...carrito, producto];

      const eliminarProducto = (carrito, id) =>
        carrito.filter((p) => p.id !== id);

      const calcularTotal = (carrito) =>
        carrito.reduce((total, p) => total + p.precio * p.cantidad, 0);

      const aplicarDescuento = (carrito, porcentaje) => {
        const total = calcularTotal(carrito);
        const descuento = total * (porcentaje / 100);
        return parseFloat((total - descuento).toFixed(2));
      };

      // ─── Utilidades de presentación ─────────────────────────────────────────────

      const mostrarCarrito = (carrito, etiqueta) => {
        console.log(`\n  📦 ${etiqueta}`);
        console.log("  ─────────────────────────────────────────────");
        if (carrito.length === 0) {
          console.log("  (carrito vacío)");
        } else {
          carrito.forEach((p) =>
            console.log(
              `  [${p.id}] ${p.nombre.padEnd(15)} $${p.precio.toFixed(2)} x ${p.cantidad} = $${(p.precio * p.cantidad).toFixed(2)}`,
            ),
          );
        }
        console.log("  ─────────────────────────────────────────────");
      };

      // ─── Simulación de operaciones ──────────────────────────────────────────────

      console.log("═══════════════════════════════════════════════════");
      console.log("           🛒  SIMULACIÓN DE CARRITO               ");
      console.log("═══════════════════════════════════════════════════");

      // Estado inicial
      let carrito = [];
      mostrarCarrito(carrito, "Carrito inicial");

      // Operación 1 — agregar Camiseta
      carrito = agregarProducto(carrito, {
        id: 1,
        nombre: "Camiseta",
        precio: 25.0,
        cantidad: 2,
      });
      mostrarCarrito(carrito, "Después de agregar: Camiseta x2");

      // Operación 2 — agregar Pantalón
      carrito = agregarProducto(carrito, {
        id: 2,
        nombre: "Pantalón",
        precio: 45.0,
        cantidad: 1,
      });
      mostrarCarrito(carrito, "Después de agregar: Pantalón x1");

      // Operación 3 — agregar Zapatillas
      carrito = agregarProducto(carrito, {
        id: 3,
        nombre: "Zapatillas",
        precio: 80.0,
        cantidad: 1,
      });
      mostrarCarrito(carrito, "Después de agregar: Zapatillas x1");

      // Operación 4 — eliminar Pantalón (id: 2)
      carrito = eliminarProducto(carrito, 2);
      mostrarCarrito(carrito, "Después de eliminar: Pantalón (id: 2)");

      // Operación 5 — calcular total sin descuento
      const total = calcularTotal(carrito);
      console.log(`\n  💰 Total sin descuento:      $${total.toFixed(2)}`);

      // Operación 6 — aplicar 10% de descuento
      const totalConDescuento = aplicarDescuento(carrito, 10);
      const ahorro = parseFloat((total - totalConDescuento).toFixed(2));
      console.log(`  🏷️  Descuento aplicado (10%): -$${ahorro.toFixed(2)}`);
      console.log(`  ✅ Total final a pagar:       $${totalConDescuento}`);
      console.log("\n═══════════════════════════════════════════════════");
    </script>
  </body>
</html>
