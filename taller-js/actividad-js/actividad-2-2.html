<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>actividad-2-2</title>
  </head>
  <body>
    <script>
      /*johan sneider berrio ramos, 
        ficha: 3312694 
        nivel: nivel-5 actividad-2-2
      */
      const aprendices = [
        { nombre: "carlos", edad: 22, nota: 4.5 },
        { nombre: "laura", edad: 19, nota: 3.8 },
        { nombre: "andres", edad: 25, nota: 4.9 },
        { nombre: "maria", edad: 21, nota: 3.2 },
        { nombre: "diego", edad: 23, nota: 4.1 },
      ];

      const nombres = aprendices.map((a) => a.nombre);

      console.log("");
      console.log("1. nombres de los aprendices:");
      console.log(">", nombres);

      const aprobados = aprendices.filter((a) => a.nota >= 4.0);

      console.log("");
      console.log("2. aprendices con nota >= 4.0.");
      aprobados.forEach((a) => console.log(`${a.nombre} - nota: ${a.nota}`));

      const sumaedades = aprendices.reduce((acum, a) => acum + a.edad, 0);
      const promedioedad = (sumaedades / aprendices.length).toFixed(2);

      console.log("");
      console.log("3. promedio de edad del grupo:");
      console.log(`>${promedioedad} años`);

      const destacado = aprendices.reduce((mejor, a) =>
        a.nota > mejor.nota ? a : mejor,
      );
      console.log("");
      console.log("4. aprendiz con la nota mas alta");
      console.log(`>${destacado.nombre} con ${destacado.nota}`);
      console.log("");
    </script>
  </body>
</html>
